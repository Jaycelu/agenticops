name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: sudo apt-get update && sudo apt-get install -y libxml2-dev libxmlsec1-dev libxmlsec1-openssl pkg-config
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: pytest -m "not integration" --cov=auth --cov=audit --cov=harness --cov=tools --cov-report=term-missing
      - run: ruff check . --select E9,F63,F7,F82

  backend-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: netops_agenticops_test
          POSTGRES_USER: netops
          POSTGRES_PASSWORD: netops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U netops -d netops_agenticops_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      APP_SECRET_KEY: ci-only-secret-at-least-32-bytes
      DATABASE_URL: postgresql://netops:netops@127.0.0.1:5432/netops_agenticops_test
      AUTOMATION_OBSERVE_ONLY: "true"
      RUN_POSTGRES_TESTS: "1"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: sudo apt-get update && sudo apt-get install -y libxml2-dev libxmlsec1-dev libxmlsec1-openssl pkg-config
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: pytest -m integration
      - run: alembic check

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  deployment-contract:
    runs-on: ubuntu-latest
    env:
      APP_SECRET_KEY: ci-only-secret-at-least-32-bytes
      POSTGRES_PASSWORD: ci-only-postgres-password
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config -q
      - run: python -m compileall -q backend

  security-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: sudo apt-get update && sudo apt-get install -y libxml2-dev libxmlsec1-dev libxmlsec1-openssl pkg-config
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: bandit -r . -x tests -lll -iii
      - run: pip-audit -r requirements.txt
