services:
  postgres:
    image: postgres:16-alpine
    container_name: netops-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-netops_agenticops}
      POSTGRES_USER: ${POSTGRES_USER:-netops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-netops}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: netops-backend
    environment:
      APP_SECRET_KEY: ${APP_SECRET_KEY:-docker_dev_secret_change_me}
      DATABASE_URL: postgresql://${POSTGRES_USER:-netops}:${POSTGRES_PASSWORD:-netops}@postgres:5432/${POSTGRES_DB:-netops_agenticops}
      AUTOMATION_DATABASE_URL: postgresql://${POSTGRES_USER:-netops}:${POSTGRES_PASSWORD:-netops}@postgres:5432/${POSTGRES_DB:-netops_agenticops}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      DEBUG: ${DEBUG:-False}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      AUTOMATION_OBSERVE_ONLY: ${AUTOMATION_OBSERVE_ONLY:-True}
      TICKET_MODE: ${TICKET_MODE:-local}
      NETBOX_URL: ${NETBOX_URL:-}
      NETBOX_API_TOKEN: ${NETBOX_API_TOKEN:-}
      ELK_URL: ${ELK_URL:-}
      ELK_USERNAME: ${ELK_USERNAME:-}
      ELK_PASSWORD: ${ELK_PASSWORD:-}
      ZABBIX_URL: ${ZABBIX_URL:-}
      ZABBIX_API_URL: ${ZABBIX_API_URL:-}
      ZABBIX_USERNAME: ${ZABBIX_USERNAME:-}
      ZABBIX_PASSWORD: ${ZABBIX_PASSWORD:-}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-Qwen/Qwen3-32B-AWQ}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_URL: ${LLM_API_URL:-http://host.docker.internal:8000/v1}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-}
      LLM_EMBEDDING_API_URL: ${LLM_EMBEDDING_API_URL:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: netops-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
