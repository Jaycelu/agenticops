name: agenticops

services:
  postgres:
    image: postgres:16-alpine
    container_name: agenticops-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-netops_agenticops}
      POSTGRES_USER: ${POSTGRES_USER:-netops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: agenticops-backend
    restart: unless-stopped
    environment: &backend-environment
      APP_SECRET_KEY: ${APP_SECRET_KEY:?APP_SECRET_KEY is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-netops}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-netops_agenticops}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      DEBUG: ${DEBUG:-False}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      AUTH_PUBLIC_BASE_URL: ${AUTH_PUBLIC_BASE_URL:-}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-True}
      AUTOMATION_OBSERVE_ONLY: ${AUTOMATION_OBSERVE_ONLY:-True}
      AGENT_GRAPH_LEASE_SECONDS: ${AGENT_GRAPH_LEASE_SECONDS:-60}
      AGENT_MAX_RUNS_PER_CASE: ${AGENT_MAX_RUNS_PER_CASE:-16}
      AGENT_MAX_LLM_CALLS_PER_CASE: ${AGENT_MAX_LLM_CALLS_PER_CASE:-8}
      AGENT_MAX_TOOL_CALLS_PER_CASE: ${AGENT_MAX_TOOL_CALLS_PER_CASE:-12}
      AGENT_MAX_PROBE_CALLS_PER_CASE: ${AGENT_MAX_PROBE_CALLS_PER_CASE:-10}
      AGENT_MAX_REPLAN_COUNT: ${AGENT_MAX_REPLAN_COUNT:-3}
      AGENT_MAX_RUNTIME_SECONDS: ${AGENT_MAX_RUNTIME_SECONDS:-900}
      AGENT_MAX_TARGET_DEVICES: ${AGENT_MAX_TARGET_DEVICES:-3}
      AGENT_MAX_TOOL_CALLS_PER_RUN: ${AGENT_MAX_TOOL_CALLS_PER_RUN:-3}
      HYPOTHESIS_CONFIRM_CONFIDENCE: ${HYPOTHESIS_CONFIRM_CONFIDENCE:-0.75}
      HYPOTHESIS_EVIDENCE_MAX_AGE_SECONDS: ${HYPOTHESIS_EVIDENCE_MAX_AGE_SECONDS:-3600}
      HYPOTHESIS_MAX_HIGH_WEIGHT_CONTRADICTIONS: ${HYPOTHESIS_MAX_HIGH_WEIGHT_CONTRADICTIONS:-0}
      TICKET_MODE: ${TICKET_MODE:-local}
      NETBOX_URL: ${NETBOX_URL:-}
      NETBOX_API_TOKEN: ${NETBOX_API_TOKEN:-}
      ELK_URL: ${ELK_URL:-}
      ELK_USERNAME: ${ELK_USERNAME:-}
      ELK_PASSWORD: ${ELK_PASSWORD:-}
      ZABBIX_URL: ${ZABBIX_URL:-}
      ZABBIX_API_URL: ${ZABBIX_API_URL:-}
      ZABBIX_USERNAME: ${ZABBIX_USERNAME:-}
      ZABBIX_PASSWORD: ${ZABBIX_PASSWORD:-}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-Qwen/Qwen3-32B-AWQ}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_URL: ${LLM_API_URL:-http://host.docker.internal:8000/v1}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-}
      LLM_EMBEDDING_API_URL: ${LLM_EMBEDDING_API_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-True}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: ./backend
    container_name: agenticops-worker
    command: ["python", "-m", "worker"]
    restart: unless-stopped
    environment: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-m", "scripts.check_worker_health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  migrate:
    build:
      context: ./backend
    container_name: agenticops-migrate
    command: ["alembic", "upgrade", "head"]
    environment:
      APP_SECRET_KEY: ${APP_SECRET_KEY:?APP_SECRET_KEY is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-netops}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-netops_agenticops}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: agenticops-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
